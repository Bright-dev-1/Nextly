<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nextly — Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #080608;
    --bg2:          #0e0a0c;
    --surface:      #120d0f;
    --surface2:     #1a1114;
    --surface3:     #221519;
    --border:       rgba(220,50,50,0.1);
    --border-hover: rgba(220,50,50,0.25);
    --red:          #d43a3a;
    --red-bright:   #f05252;
    --red-dim:      rgba(212,58,58,0.12);
    --red-glow:     rgba(212,58,58,0.06);
    --crimson:      #8b1a1a;
    --white:        #f0e8e8;
    --white-dim:    rgba(240,232,232,0.5);
    --white-muted:  rgba(240,232,232,0.2);
    --amber:        #e0955a;
    --blue-faint:   #5a7ae0;
    --text:         #ddd0d0;
    --text-dim:     rgba(221,208,208,0.4);
    --radius:       1px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12.5px;
    overflow-x: hidden;
  }

  /* Grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.8;
  }

  /* Red ambient glow */
  body::after {
    content: '';
    position: fixed;
    top: -10%;
    left: 50%;
    transform: translateX(-50%);
    width: 70vw;
    height: 50vh;
    background: radial-gradient(ellipse at 50% 0%, rgba(180,20,20,0.07) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 255px 1fr;
    grid-template-rows: auto 1fr;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 26px 40px 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(20,6,6,0.9) 0%, transparent 100%);
    animation: fadeDown 0.5s ease both;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    background: var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    clip-path: polygon(0 0, 85% 0, 100% 15%, 100% 100%, 15% 100%, 0 85%);
    flex-shrink: 0;
  }

  .logo-mark svg {
    width: 16px;
    height: 16px;
    fill: #fff;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .logo-word {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--white);
    line-height: 1;
  }

  .logo-word span { color: var(--red-bright); }

  .logo-tagline {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .header-right {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .header-date {
    font-size: 10.5px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .header-progress {
    font-size: 10.5px;
    color: var(--red);
    letter-spacing: 0.06em;
  }

  /* SIDEBAR */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
    animation: fadeRight 0.5s 0.08s ease both;
  }

  .sidebar-label {
    font-size: 8.5px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 0 10px;
    margin-bottom: 4px;
    margin-top: 16px;
  }

  .sidebar-label:first-child { margin-top: 0; }

  .filter-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--white-muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.18s;
    text-align: left;
    width: 100%;
  }

  .filter-btn:hover {
    color: var(--white);
    border-color: var(--border-hover);
    background: var(--surface2);
  }

  .filter-btn.active {
    color: var(--red-bright);
    border-color: rgba(212,58,58,0.3);
    background: var(--red-dim);
  }

  .filter-count {
    font-size: 9.5px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 1px 7px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
  }

  .filter-btn.active .filter-count {
    background: rgba(212,58,58,0.18);
    border-color: rgba(212,58,58,0.35);
    color: var(--red-bright);
  }

  .priority-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    flex-shrink: 0;
  }
  .dot-high { background: var(--red-bright); box-shadow: 0 0 5px var(--red); }
  .dot-med  { background: var(--amber); }
  .dot-low  { background: var(--blue-faint); }

  .sidebar-divider {
    height: 1px;
    background: var(--border);
    margin: 8px 10px;
  }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .progress-bar-wrap { margin-top: 6px; }

  .progress-bar-label {
    display: flex;
    justify-content: space-between;
    font-size: 9.5px;
    color: var(--text-dim);
    margin-bottom: 7px;
    letter-spacing: 0.1em;
  }

  .progress-bar-label span:last-child { color: var(--red); }

  .progress-bar-track {
    height: 2px;
    background: var(--surface3);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--crimson), var(--red-bright));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 8px rgba(212,58,58,0.5);
  }

  /* MAIN */
  .main {
    padding: 34px 48px;
    display: flex;
    flex-direction: column;
    gap: 26px;
    animation: fadeUp 0.5s 0.12s ease both;
    overflow-y: auto;
    max-height: calc(100vh - 71px);
  }

  /* INPUT CARD */
  .input-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }

  .input-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .input-card:focus-within {
    border-color: rgba(212,58,58,0.28);
    box-shadow: 0 0 30px rgba(180,20,20,0.08);
  }

  .input-card:focus-within::before { opacity: 1; }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .input-cursor {
    color: var(--red);
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    flex-shrink: 0;
    animation: blink 1.1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .task-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--white);
    letter-spacing: 0.02em;
  }

  .task-input::placeholder {
    color: var(--text-dim);
    font-style: italic;
  }

  .input-options {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
  }

  .option-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-right: 2px;
  }

  .pill-select { display: flex; gap: 5px; }

  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--white-muted);
    font-family: 'Space Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.18s;
    text-transform: uppercase;
  }

  .pill:hover { border-color: var(--border-hover); color: var(--text); }
  .pill.selected-high { background: rgba(240,82,82,0.12); border-color: rgba(240,82,82,0.45); color: var(--red-bright); }
  .pill.selected-med  { background: rgba(224,149,90,0.12); border-color: rgba(224,149,90,0.4); color: var(--amber); }
  .pill.selected-low  { background: rgba(90,122,224,0.12); border-color: rgba(90,122,224,0.4); color: var(--blue-faint); }

  .add-btn {
    background: var(--red);
    color: #fff;
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    padding: 8px 22px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
  }

  .add-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
    pointer-events: none;
  }

  .add-btn:hover {
    background: var(--red-bright);
    transform: translateY(-1px);
    box-shadow: 0 4px 18px rgba(212,58,58,0.35);
  }

  .add-btn:active { transform: translateY(0); box-shadow: none; }

  /* TASK LIST */
  .tasks-section {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .tasks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .tasks-title {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .clear-btn {
    background: none;
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 9.5px;
    color: var(--text-dim);
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: color 0.2s;
  }

  .clear-btn:hover { color: var(--red-bright); }

  /* TASK ITEM */
  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 16px;
    display: flex;
    align-items: center;
    gap: 13px;
    cursor: pointer;
    transition: all 0.18s;
    animation: slideIn 0.25s ease both;
    position: relative;
    overflow: hidden;
  }

  .task-item::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
  }

  .task-item[data-priority="high"]::after  { background: var(--red-bright); box-shadow: 1px 0 8px rgba(240,82,82,0.5); }
  .task-item[data-priority="med"]::after   { background: var(--amber); }
  .task-item[data-priority="low"]::after   { background: var(--blue-faint); }

  .task-item:hover {
    border-color: var(--border-hover);
    background: var(--surface2);
    transform: translateX(2px);
  }

  .task-item.done { opacity: 0.38; }
  .task-item.done:hover { opacity: 0.55; }

  .task-check {
    width: 17px;
    height: 17px;
    border: 1px solid rgba(212,58,58,0.3);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    background: var(--surface2);
  }

  .task-item:hover .task-check {
    border-color: var(--red);
    background: var(--red-dim);
  }

  .task-item.done .task-check {
    background: var(--red-dim);
    border-color: var(--red);
  }

  .check-icon {
    display: none;
    color: var(--red-bright);
    font-size: 10px;
    font-weight: 700;
  }

  .task-item.done .check-icon { display: block; }

  .task-text {
    flex: 1;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--white);
    line-height: 1.45;
    transition: color 0.18s;
  }

  .task-item.done .task-text {
    text-decoration: line-through;
    text-decoration-color: rgba(240,232,232,0.2);
    color: var(--white-dim);
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .task-time {
    font-size: 9.5px;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  .delete-btn {
    background: none;
    border: none;
    color: transparent;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
    padding: 2px 4px;
    transition: color 0.2s;
    border-radius: 1px;
  }

  .task-item:hover .delete-btn { color: var(--text-dim); }
  .delete-btn:hover { color: var(--red-bright) !important; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 64px 20px;
    color: var(--text-dim);
    animation: fadeUp 0.4s ease both;
  }

  .empty-icon {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    font-style: italic;
    font-weight: 400;
    color: rgba(212,58,58,0.15);
    display: block;
    margin-bottom: 14px;
    letter-spacing: 0.05em;
  }

  .empty-text {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeRight {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes pop {
    0%   { transform: translateX(2px) scale(1); }
    40%  { transform: translateX(2px) scale(1.02); }
    100% { transform: translateX(0) scale(1); }
  }

  .task-item.just-added {
    animation: slideIn 0.25s ease both, pop 0.35s 0.1s ease both;
  }

  /* SCROLLBAR */
  .main::-webkit-scrollbar { width: 3px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: rgba(212,58,58,0.2); border-radius: 99px; }

  /* RESPONSIVE */
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; }
    .sidebar { grid-row: 2; border-right: none; border-bottom: 1px solid var(--border); padding: 14px 16px; flex-direction: row; flex-wrap: wrap; gap: 5px; }
    .sidebar-label, .sidebar-footer, .sidebar-divider { display: none; }
    .main { padding: 22px 18px; max-height: none; }
    .header { padding: 18px 18px 14px; }
    .logo-word { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 16 16"><path d="M2 2h5l7 7-7 7H2l7-7z"/></svg>
      </div>
      <div class="logo-text">
        <span class="logo-word">Next<span>ly</span></span>
        <span class="logo-tagline">Task Manager</span>
      </div>
    </div>
    <div class="header-right">
      <div class="header-date" id="headerDate"></div>
      <div class="header-progress" id="headerProgress"></div>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-label">Views</div>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">
      All Tasks <span class="filter-count" id="cnt-all">0</span>
    </button>
    <button class="filter-btn" data-filter="active" onclick="setFilter('active')">
      Active <span class="filter-count" id="cnt-active">0</span>
    </button>
    <button class="filter-btn" data-filter="done" onclick="setFilter('done')">
      Completed <span class="filter-count" id="cnt-done">0</span>
    </button>

    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Priority</div>

    <button class="filter-btn" data-filter="high" onclick="setFilter('high')">
      <span><span class="priority-dot dot-high"></span>High</span>
      <span class="filter-count" id="cnt-high">0</span>
    </button>
    <button class="filter-btn" data-filter="med" onclick="setFilter('med')">
      <span><span class="priority-dot dot-med"></span>Medium</span>
      <span class="filter-count" id="cnt-med">0</span>
    </button>
    <button class="filter-btn" data-filter="low" onclick="setFilter('low')">
      <span><span class="priority-dot dot-low"></span>Low</span>
      <span class="filter-count" id="cnt-low">0</span>
    </button>

    <div class="sidebar-footer">
      <div class="progress-bar-wrap">
        <div class="progress-bar-label">
          <span>Completion</span>
          <span id="pct">0%</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="input-card">
      <div class="input-row">
        <span class="input-cursor">›</span>
        <input
          class="task-input"
          id="taskInput"
          type="text"
          placeholder="What needs to be done?"
          autocomplete="off"
          onkeydown="handleKey(event)"
        />
      </div>
      <div class="input-options">
        <span class="option-label">Priority</span>
        <div class="pill-select" id="prioritySelect">
          <button class="pill" data-p="high" onclick="selectPriority('high')">High</button>
          <button class="pill selected-med" data-p="med" onclick="selectPriority('med')">Med</button>
          <button class="pill" data-p="low" onclick="selectPriority('low')">Low</button>
        </div>
        <button class="add-btn" onclick="addTask()">+ Add Task</button>
      </div>
    </div>

    <div class="tasks-section">
      <div class="tasks-header">
        <span class="tasks-title" id="listLabel">All Tasks</span>
        <button class="clear-btn" onclick="clearCompleted()">Clear completed</button>
      </div>
      <div id="taskList"></div>
    </div>
  </main>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('nextly_tasks') || '[]');
  let filter = 'all';
  let selectedPriority = 'med';

  const now = new Date();
  document.getElementById('headerDate').textContent =
    now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

  function selectPriority(p) {
    selectedPriority = p;
    document.querySelectorAll('#prioritySelect .pill').forEach(el => {
      el.className = 'pill';
      if (el.dataset.p === p) el.classList.add('selected-' + p);
    });
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) { input.focus(); return; }
    const task = {
      id: Date.now(), text,
      priority: selectedPriority, done: false,
      created: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
    };
    tasks.unshift(task);
    save(); render(task.id);
    input.value = ''; input.focus();
  }

  function handleKey(e) { if (e.key === 'Enter') addTask(); }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id, e) {
    e.stopPropagation();
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.done);
    save(); render();
  }

  function setFilter(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.filter === f));
    const labels = { all: 'All Tasks', active: 'Active Tasks', done: 'Completed', high: 'High Priority', med: 'Medium Priority', low: 'Low Priority' };
    document.getElementById('listLabel').textContent = labels[f];
    render();
  }

  function save() { localStorage.setItem('nextly_tasks', JSON.stringify(tasks)); }

  function updateCounts() {
    const all = tasks.length, done = tasks.filter(t => t.done).length;
    document.getElementById('cnt-all').textContent = all;
    document.getElementById('cnt-active').textContent = all - done;
    document.getElementById('cnt-done').textContent = done;
    document.getElementById('cnt-high').textContent = tasks.filter(t => t.priority === 'high').length;
    document.getElementById('cnt-med').textContent = tasks.filter(t => t.priority === 'med').length;
    document.getElementById('cnt-low').textContent = tasks.filter(t => t.priority === 'low').length;
    const pct = all ? Math.round(done / all * 100) : 0;
    document.getElementById('pct').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('headerProgress').textContent = all ? done + ' of ' + all + ' complete' : 'No tasks yet';
  }

  function render(newId) {
    updateCounts();
    let visible = [...tasks];
    if (filter === 'active') visible = visible.filter(t => !t.done);
    else if (filter === 'done') visible = visible.filter(t => t.done);
    else if (['high','med','low'].includes(filter)) visible = visible.filter(t => t.priority === filter);

    const list = document.getElementById('taskList');
    if (!visible.length) {
      list.innerHTML = '<div class="empty-state"><span class="empty-icon">nil.</span><div class="empty-text">Nothing here yet</div></div>';
      return;
    }

    list.innerHTML = visible.map(t => `
      <div class="task-item ${t.done ? 'done' : ''} ${t.id === newId ? 'just-added' : ''}"
           data-priority="${t.priority}" onclick="toggleTask(${t.id})">
        <div class="task-check"><span class="check-icon">✓</span></div>
        <span class="task-text">${esc(t.text)}</span>
        <div class="task-meta">
          <span class="task-time">${t.created}</span>
          <button class="delete-btn" onclick="deleteTask(${t.id},event)" title="Delete">✕</button>
        </div>
      </div>`).join('');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  render();
</script>
</body>
</html>
